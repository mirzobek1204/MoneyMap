<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyMap - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <h1 data-i18n="app.name">MoneyMap</h1>
        <form id="loginForm">
            <input type="text" id="usernameInput" placeholder="Ismingizni kiriting" required>
            <button type="submit">Kirish</button>
        </form>
        
        <div id="continueArea" class="mt-4">
            <p id="continueText"></p>
            <button id="continueBtn" class="hidden">Davom etish</button>
        </div>

        <select id="languageSelect">
            <option value="uz">O'zbek</option>
            <option value="ru">Русский</option>
            <option value="en">English</option>
        </select>
    </div>

    <script src="js/core.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
