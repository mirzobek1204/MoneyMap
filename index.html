<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulPulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-auth">
  <div class="bg-layer"></div>

  <main class="auth-wrap">
    <section class="auth-panel">
      <div class="panel-top">
        <p class="logo-pill">PulPulse</p>
        <div class="lang-box">
          <label for="languageSelect" data-i18n="language.label">Language</label>
          <select id="languageSelect">
            <option value="uz">Uzbek</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
          </select>
        </div>
      </div>

      <h1 data-i18n="login.title">Xarajatlarni boshqarish endi oson</h1>
      <p class="auth-subtitle" data-i18n="login.subtitle">Ismingizni kiriting va darhol ishlashni boshlang.</p>

      <form id="loginForm" class="auth-form">
        <label for="usernameInput" data-i18n="login.inputLabel">Ism</label>
        <input id="usernameInput" type="text" autocomplete="off" data-i18n-placeholder="login.placeholder" placeholder="masalan: Mirzobek" required />
        <button type="submit" data-i18n="login.submit">Kirish</button>
      </form>

      <p id="continueText" class="muted"></p>
      <button id="continueBtn" class="ghost wide hidden" type="button"></button>
    </section>
  </main>

  <script src="js/core.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
