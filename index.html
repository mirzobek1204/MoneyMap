<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulPulse - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-auth">
    <div class="bg-layer"></div>
    <div class="bg-flare flare-auth-a"></div>
    <div class="bg-flare flare-auth-b"></div>

    <div class="auth-panel">
      <div class="panel-top">
        <p class="logo-pill" data-i18n="app.name">PulPulse</p>
        <div class="lang-box">
          <label class="sr-only" for="languageSelect" data-i18n="language.label">Til</label>
          <select id="languageSelect">
            <option value="uz">O'zbek</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
          </select>
        </div>
      </div>

      <h1 data-i18n="login.title">PulPulse</h1>
      <p class="auth-subtitle" data-i18n="login.subtitle">
        Xarajatlaringizni sodda va tez kuzating.
      </p>

      <form id="loginForm" class="auth-form">
        <div class="input-shell">
          <label for="usernameInput" data-i18n="login.nameLabel">Ismingiz</label>
          <input
            type="text"
            id="usernameInput"
            placeholder="Ismingizni kiriting"
            data-i18n-placeholder="login.namePlaceholder"
            required
          />
        </div>
        <button class="glow-btn" type="submit" data-i18n="login.button">Kirish</button>
      </form>

    </div>

    <div id="toast" class="toast"></div>

    <script src="js/core.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
