<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulPulse - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-app">
    <div class="bg-layer"></div>
    <div class="bg-flare flare-app-a"></div>
    <div class="bg-flare flare-app-c"></div>
    <div id="navBackdrop" class="nav-backdrop" aria-hidden="true"></div>

    <div class="shell">
      <aside class="sidebar premium-panel">
        <p class="logo-pill large" data-i18n="app.name">PulPulse</p>
        <nav class="menu">
          <a class="menu-link active" href="dashboard.html" data-i18n="nav.dashboard">Dashboard</a>
          <a class="menu-link" href="expenses.html" data-i18n="nav.expenses">Xarajatlar</a>
        </nav>
        <button id="logoutBtn" class="danger wide" type="button" data-i18n="nav.logout">
          Chiqish
        </button>
      </aside>

      <main class="content">
        <header class="topbar premium-panel">
          <button id="topMenuBtn" class="top-menu-btn" type="button" aria-label="Menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div>
            <h1 data-i18n="dashboard.title">Dashboard</h1>
            <p id="welcomeText" class="muted strong"></p>
          </div>
          <div class="lang-box vivid">
            <label for="languageSelect" data-i18n="language.label">Til</label>
            <select id="languageSelect">
              <option value="uz">O'zbek</option>
              <option value="en">English</option>
              <option value="ru">Русский</option>
            </select>
          </div>
        </header>

        <section class="panel premium-panel neon-outline">
          <div class="stats-grid">
            <div class="stat">
              <span class="stat-label" data-i18n="stats.today">Bugun</span>
              <span id="todayTotal" class="stat-value">0</span>
            </div>
            <div class="stat">
              <span class="stat-label" data-i18n="stats.month">Shu oy</span>
              <span id="monthTotal" class="stat-value">0</span>
            </div>
            <div class="stat">
              <span class="stat-label" data-i18n="stats.all">Jami</span>
              <span id="allTotal" class="stat-value">0</span>
            </div>
          </div>
        </section>

        <section class="panel premium-panel">
          <h2 data-i18n="expense.save">Saqlash</h2>
          <form id="expenseForm" class="form-grid">
            <label>
              <span data-i18n="expense.date">Sana</span>
              <input type="date" id="dateInput" />
            </label>
            <label>
              <span data-i18n="expense.amount">Summa</span>
              <input type="number" id="amountInput" placeholder="0" />
            </label>
            <label>
              <span data-i18n="expense.category">Kategoriya</span>
              <select id="categoryInput">
                <option value="food" data-i18n="category.food">Ovqat</option>
                <option value="transport" data-i18n="category.transport">Transport</option>
                <option value="utilities" data-i18n="category.utilities">Kommunal</option>
                <option value="health" data-i18n="category.health">Sog'liq</option>
                <option value="fun" data-i18n="category.fun">Ko'ngilochar</option>
                <option value="other" data-i18n="category.other">Boshqa</option>
              </select>
            </label>
            <label class="span-2">
              <span data-i18n="expense.note">Izoh</span>
              <input type="text" id="noteInput" placeholder="..." />
            </label>
            <button class="glow-btn" type="submit" data-i18n="expense.save">Saqlash</button>
          </form>
        </section>

        <section class="panel premium-panel">
          <h2 data-i18n="budget.title">Oylik limit</h2>
          <div class="budget-grid">
            <input type="number" id="budgetInput" placeholder="Oylik limit" data-i18n-placeholder="budget.placeholder" />
            <button id="saveBudgetBtn" class="glow-btn" type="button" data-i18n="budget.set">
              Limitni o'rnatish
            </button>
          </div>
          <div class="budget-bar">
            <div id="budgetBar" class="budget-bar-fill"></div>
          </div>
          <p id="budgetUsedText" class="muted strong"></p>
          <p id="budgetLeftText" class="muted strong"></p>
        </section>

        <section class="panel premium-panel neon-outline">
          <h2 data-i18n="dashboard.insightTitle">Insight</h2>
          <p id="challengeText" class="muted strong"></p>
          <p id="streakText" class="muted strong"></p>
          <p id="insightText" class="muted strong"></p>
        </section>

        <section class="panel premium-panel">
          <h2 data-i18n="dashboard.recentTitle">Oxirgi xarajatlar</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th data-i18n="table.date">Sana</th>
                  <th data-i18n="table.category">Kategoriya</th>
                  <th data-i18n="table.amount">Miqdor</th>
                  <th data-i18n="table.note">Izoh</th>
                  <th data-i18n="table.action">Amal</th>
                </tr>
              </thead>
              <tbody id="recentBody"></tbody>
            </table>
          </div>
          <p id="recentEmpty" class="muted"></p>
        </section>
      </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/core.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
