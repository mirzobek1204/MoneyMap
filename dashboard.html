<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyMap - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h2 id="welcomeText"></h2>
        <button id="logoutBtn">Chiqish</button>
    </header>

    <main>
        <div class="stats-grid">
            <div>Bugun: <span id="todayTotal">0</span></div>
            <div>Shu oy: <span id="monthTotal">0</span></div>
            <div>Jami: <span id="allTotal">0</span></div>
        </div>

        <form id="expenseForm">
            <input type="date" id="dateInput">
            <input type="number" id="amountInput" placeholder="Summa">
            <select id="categoryInput">
                <option value="food">Ovqat</option>
                <option value="transport">Transport</option>
                <option value="other">Boshqa</option>
            </select>
            <input type="text" id="noteInput" placeholder="Izoh">
            <button type="submit">Saqlash</button>
        </form>

        <div class="budget-section">
            <input type="number" id="budgetInput" placeholder="Oylik limit">
            <button id="saveBudgetBtn">Limitni o'rnatish</button>
            <div id="budgetBar" style="height: 10px; background: #eee; width: 100%;"></div>
            <p id="budgetUsedText"></p>
            <p id="budgetLeftText"></p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Sana</th>
                    <th>Kategoriya</th>
                    <th>Summa</th>
                    <th>Amal</th>
                </tr>
            </thead>
            <tbody id="recentBody"></tbody>
        </table>
        <p id="recentEmpty"></p>
    </main>

    <script src="js/core.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
