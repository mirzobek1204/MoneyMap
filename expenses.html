<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulPulse - Expenses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-app">
  <div class="bg-layer"></div>
  <div class="bg-flare flare-app-a"></div>
  <div class="bg-flare flare-app-c"></div>
  <div id="navBackdrop" class="nav-backdrop" aria-hidden="true"></div>

  <div class="shell">
    <aside class="sidebar premium-panel">
      <p class="logo-pill large" data-i18n="app.name">PulPulse</p>
      <nav class="menu">
        <a class="menu-link" href="dashboard.html" data-i18n="nav.dashboard">Dashboard</a>
        <a class="menu-link active" href="expenses.html" data-i18n="nav.expenses">Xarajatlar</a>
      </nav>
      <button id="logoutBtn" class="danger wide" type="button" data-i18n="nav.logout">Chiqish</button>
    </aside>

    <main class="content">
      <header class="topbar premium-panel">
        <button id="topMenuBtn" class="top-menu-btn" type="button" aria-label="Menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div>
          <h1 data-i18n="expenses.title">Xarajatlar Ro'yxati</h1>
          <p id="welcomeText" class="muted strong"></p>
        </div>
        <div class="lang-box vivid">
          <label for="languageSelect" data-i18n="language.label">Language</label>
          <select id="languageSelect">
            <option value="uz">Uzbek</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
          </select>
        </div>
      </header>

      <section class="panel premium-panel neon-outline">
        <h2 data-i18n="filter.title">Filter</h2>
        <form id="filterForm" class="form-grid">
          <label>
            <span data-i18n="filter.from">Boshlanish sana</span>
            <input id="fromDate" type="date" />
          </label>
          <label>
            <span data-i18n="filter.to">Tugash sana</span>
            <input id="toDate" type="date" />
          </label>
          <label>
            <span data-i18n="expense.category">Kategoriya</span>
            <select id="filterCategory">
              <option value="" data-i18n="filter.all">Barchasi</option>
              <option value="food" data-i18n="category.food">Ovqat</option>
              <option value="transport" data-i18n="category.transport">Transport</option>
              <option value="utilities" data-i18n="category.utilities">Kommunal</option>
              <option value="health" data-i18n="category.health">Sog'liq</option>
              <option value="fun" data-i18n="category.fun">Ko'ngilochar</option>
              <option value="other" data-i18n="category.other">Boshqa</option>
            </select>
          </label>
          <button class="glow-btn" type="submit" data-i18n="filter.apply">Qo'llash</button>
        </form>
        <p id="filteredText" class="muted strong"></p>
      </section>

      <section class="panel premium-panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="table.date">Sana</th>
                <th data-i18n="table.category">Kategoriya</th>
                <th data-i18n="table.amount">Miqdor</th>
                <th data-i18n="table.note">Izoh</th>
                <th data-i18n="table.action">Amal</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <p id="emptyText" class="muted"></p>
      </section>

      <section class="panel premium-panel care-zone">
        <h2 data-i18n="danger.title">Ma'lumotlarni Boshqarish</h2>
        <p class="muted" data-i18n="danger.text">Faqat joriy profil ma'lumotlari tozalanadi.</p>
        <button id="clearBtn" class="danger" type="button" data-i18n="danger.clear">Joriy profilni tozalash</button>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/core.js"></script>
  <script src="js/expenses.js"></script>
</body>
</html>
